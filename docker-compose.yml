version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scrum
      POSTGRES_USER: scrum
      POSTGRES_PASSWORD: scrum
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pg_data:
