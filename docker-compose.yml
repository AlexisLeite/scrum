version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scrum
      POSTGRES_USER: scrum
      POSTGRES_PASSWORD: scrum
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 3100
      MCP_PORT: 3101
    ports:
      - "3100:3100"
      - "3101:3101"
    depends_on:
      - postgres
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  pg_data:
